<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batak Store - Premium Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

    <nav class="border-b border-slate-800 bg-slate-900/50 backdrop-blur sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black bg-gradient-to-r from-amber-400 to-orange-500 bg-clip-text text-transparent tracking-wider">🦆 BATAK AI</h1>
            <div class="flex items-center gap-6">
                <a href="admin.html" class="text-sm font-semibold text-amber-400 hover:underline">⚡ AI Admin Panel</a>
                <div class="relative bg-slate-800 px-4 py-2 rounded-full border border-slate-700">
                    🛒 Cart (<span id="cartCount" class="font-bold text-amber-400">0</span>)
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-12">
        <div class="text-center mb-12">
            <h2 class="text-4xl font-extrabold mb-2">Batak AI Live Catalog</h2>
            <p class="text-slate-400 text-sm">Products uploaded from your secret AI dashboard will instantly show up here.</p>
        </div>

        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden p-4 shadow-xl">
                <div class="w-full h-48 bg-slate-950 rounded-xl flex items-center justify-center overflow-hidden border border-slate-800/50">
                    <span class="text-slate-600 text-5xl">🥚</span>
                </div>
                <div class="mt-4">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="text-lg font-bold text-white">Default Sample Variant</h3>
                        <span class="text-amber-400 font-black text-xl">₹99</span>
                    </div>
                    <p class="text-sm text-slate-400 line-clamp-2 mb-4">Go to AI Admin Panel to upload your customized screenshots and live sync real items.</p>
                    <button onclick="addToCart(99)" class="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-2.5 rounded-xl transition-all border border-slate-700">
                        Add To Cart
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let cartCount = 0;
        function addToCart(price) {
            cartCount++;
            document.getElementById('cartCount').innerText = cartCount;
            alert(`Item added to cart! Price: ₹${price}`);
        }

        function loadAIProducts() {
            const products = JSON.parse(localStorage.getItem('batak_products')) || [];
            const grid = document.getElementById('productGrid');

            products.forEach(product => {
                const card = document.createElement('div');
                card.className = "bg-slate-900 border border-amber-500/20 shadow-lg shadow-amber-500/5 rounded-2xl overflow-hidden p-4 relative";
                card.innerHTML = `
                    <div class="absolute top-3 right-3 bg-amber-500 text-slate-950 text-[10px] font-black px-2 py-0.5 rounded-full">AI AUTOMATED</div>
                    <div class="w-full h-48 bg-slate-950 rounded-xl flex items-center justify-center overflow-hidden border border-slate-800">
                        <img src="${product.image}" class="max-h-full max-w-full object-contain" alt="Product Image" />
                    </div>
                    <div class="mt-4">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="text-lg font-bold text-white">${product.title}</h3>
                            <span class="text-amber-400 font-black text-xl">₹${product.price}</span>
                        </div>
                        <p class="text-sm text-slate-400 line-clamp-3 mb-4">${product.description}</p>
                        <button onclick="addToCart(${product.price})" class="w-full bg-gradient-to-r from-amber-500 to-orange-600 text-slate-950 font-bold py-2.5 rounded-xl transition-all shadow-md">
                            Add To Cart
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        window.onload = loadAIProducts;
    </script>
</body>
</html>
